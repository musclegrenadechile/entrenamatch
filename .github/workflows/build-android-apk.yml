name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write   # needed for creating releases

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web for Capacitor (relative base)
        run: CAPACITOR=1 npm run build:web

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Cache Gradle and Android SDK
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            /usr/local/lib/android/sdk
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Setup Android SDK (platforms & tools for compileSdk 36)
        run: |
          export ANDROID_HOME=/usr/local/lib/android/sdk
          mkdir -p "$ANDROID_HOME/cmdline-tools"
          if [ ! -d "$ANDROID_HOME/cmdline-tools/latest" ]; then
            cd "$ANDROID_HOME/cmdline-tools"
            curl -sSL -o cmdline-tools.zip "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip"
            unzip -q cmdline-tools.zip
            mv cmdline-tools latest || true
            rm -f cmdline-tools.zip
          fi
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null 2>&1 || true
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0"
        shell: bash

      - name: Build Debug APK
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK artifact (for quick download)
        uses: actions/upload-artifact@v4
        with:
          name: EntrenaMatch-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Create/Update Pre-Alpha Android Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-prealpha
          name: "Pre-Alpha Android APK (latest)"
          body: |
            **EntrenaMatch Pre-Alpha Android App**

            This is an automatically built debug APK from the latest main branch.

            - Install on Android (enable unknown sources)
            - Includes latest features from the web Pre-Alpha (real Firebase backend, profiles, matches, 1:1 + group chat, sessions)
            - Built with Capacitor for native experience

            **Download the APK below** (app-debug.apk)

            For the web version: https://musclegrenadechile.github.io/entrenamatch/

            Report issues on GitHub.
          draft: false
          prerelease: true
          files: android/app/build/outputs/apk/debug/app-debug.apk
          token: ${{ secrets.GITHUB_TOKEN }}
