name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write   # needed for creating releases

jobs:
  build-apk:
    runs-on: ubuntu-latest
    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Ensure Capacitor native plugins are installed (fix resolution in CI)
        run: npm install --no-package-lock --prefer-offline=false @capacitor/push-notifications@8.1.1 @capacitor/camera@8.2.0 --no-save

      - name: Verify plugins installed
        run: |
          ls node_modules/@capacitor/push-notifications/dist/esm/index.js || echo "push not found"
          ls node_modules/@capacitor/camera/dist/esm/index.js || echo "camera not found"

      - name: Clean build artifacts (avoid stale Vite/Rolldown cache)
        run: rm -rf node_modules/.vite dist

      - name: Clean any stale TS build info (prevents incremental parse issues on refactors)
        run: |
          rm -rf tsconfig.tsbuildinfo node_modules/.tmp/*.tsbuildinfo 2>/dev/null || true
          echo "Build info cleaned for fresh tsc -b"

      - name: Build web for Capacitor (relative base)
        run: CAPACITOR=1 npm run build:web
        # Script is now "tsc --noEmit && vite build" (robust vs incremental tsbuildinfo on refactors).
        # CAPACITOR=1 tells Vite config to use relative base for Capacitor assets.
        # Combined with the stale tsbuildinfo clean step above, this is resilient.

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Cache Gradle and Android SDK
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            /usr/local/lib/android/sdk
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Setup Android SDK (platforms & tools for compileSdk 36)
        run: |
          export ANDROID_HOME=/usr/local/lib/android/sdk
          mkdir -p "$ANDROID_HOME/cmdline-tools"
          if [ ! -d "$ANDROID_HOME/cmdline-tools/latest" ]; then
            cd "$ANDROID_HOME/cmdline-tools"
            curl -sSL -o cmdline-tools.zip "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip"
            unzip -q cmdline-tools.zip
            mv cmdline-tools latest || true
            rm -f cmdline-tools.zip
            chmod +x "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" || true
          fi
          SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          yes | $SDKMANAGER --sdk_root=$ANDROID_HOME --licenses >/dev/null 2>&1 || true
          $SDKMANAGER --sdk_root=$ANDROID_HOME \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0"
        shell: bash

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Inject google-services.json (optional secret)
        env:
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON_BASE64" ]; then
            echo "$GOOGLE_SERVICES_JSON_BASE64" | base64 -d > android/app/google-services.json
            echo "google-services.json injected from secret"
          else
            echo "No GOOGLE_SERVICES_JSON_BASE64 secret — native Firebase may not init in CI APK"
          fi

      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Check if debug APK was produced
        id: check-apk
        run: |
          if [ -f "android/app/build/outputs/apk/debug/app-debug.apk" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload APK artifact (for quick download)
        if: steps.check-apk.outputs.exists == 'true'
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: EntrenaMatch-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Create/Update Pre-Alpha Android Release (only if APK was successfully built)
        if: steps.check-apk.outputs.exists == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-prealpha
          name: "Pre-Alpha Android APK (latest)"
          body: |
            **EntrenaMatch Pre-Alpha Android App**

            This is an automatically built debug APK from the latest main branch.

            - Install on Android (enable unknown sources)
            - Includes latest features from the web Pre-Alpha (real Firebase backend, profiles, matches, 1:1 + group chat, sessions)
            - Built with Capacitor for native experience

            **Download the APK below** (app-debug.apk)

            For the web version: https://musclegrenadechile.github.io/entrenamatch/

            Report issues on GitHub.
          draft: false
          prerelease: true
          files: android/app/build/outputs/apk/debug/app-debug.apk
          token: ${{ secrets.GITHUB_TOKEN }}

