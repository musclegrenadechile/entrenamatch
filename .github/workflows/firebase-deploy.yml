name: Deploy to Firebase

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  deploy:
    if: github.event_name == 'push'  # Only deploy on push to main, not on PRs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy Firestore Rules & Indexes
        run: firebase deploy --only firestore:rules,firestore:indexes --non-interactive --force
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      # Future: Deploy Cloud Functions when we have them
      # - name: Deploy Functions
      #   run: firebase deploy --only functions --non-interactive --force
      #   env:
      #     FIREBASE_TOKEN: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

  # Optional: Validate on PRs (without deploying)
  validate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Firebase CLI
        run: npm install -g firebase-tools
      - name: Validate Firestore Rules
        run: firebase deploy --only firestore:rules --dry-run --non-interactive
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
