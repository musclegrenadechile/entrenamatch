name: Deploy to Firebase

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  deploy:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Ensure Capacitor plugins are present (for loader in mixed builds)
        run: npm install @capacitor/push-notifications@8.1.1 @capacitor/camera@8.2.0 --no-save

      - name: Clean build artifacts (avoid stale Vite/Rolldown cache)
        run: rm -rf node_modules/.vite dist

      - name: Build for Firebase Hosting (root base /)
        run: |
          npm run build -- --base=/

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy Firestore Rules, Indexes, Storage & Hosting
        run: firebase deploy --only firestore:rules,firestore:indexes,storage,hosting --non-interactive --project entrenamatch
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.auth.outputs.credentials_file_path }}

      - name: Install Functions dependencies
        run: npm ci
        working-directory: functions

      - name: Deploy Cloud Functions (FCM Red network push)
        run: firebase deploy --only functions --non-interactive --project entrenamatch
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.auth.outputs.credentials_file_path }}

  validate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Validate Firestore Rules (dry run)
        run: firebase deploy --only firestore:rules --dry-run --non-interactive --project entrenamatch
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.auth.outputs.credentials_file_path }}
