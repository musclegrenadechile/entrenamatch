apply plugin: 'com.android.application'
apply plugin: 'org.jetbrains.kotlin.android'
apply plugin: 'com.github.triplet.play'

// Load signing properties from keystore.properties (never commit the real file)
def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('keystore.properties')
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    namespace = "com.entrenamatch.app"
    compileSdk = rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "com.entrenamatch.app"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 484
        versionName "0.1.484"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    signingConfigs {
        release {
            keyAlias keystoreProperties['keyAlias']
            keyPassword keystoreProperties['keyPassword']
            storeFile keystoreProperties['storeFile'] ? file(keystoreProperties['storeFile']) : null
            storePassword keystoreProperties['storePassword']
        }
    }
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            signingConfig signingConfigs.release
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_21
        targetCompatibility JavaVersion.VERSION_21
    }
    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_21.toString()
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')

    // Firebase Crashlytics (native crashes for Android APK/AAB).
    // Using BOM for consistent Firebase versions.
    // Also enables reporting from the WebView/JS layer via native bridge if wired.
    implementation platform('com.google.firebase:firebase-bom:33.1.2')
    implementation 'com.google.firebase:firebase-crashlytics'
    implementation 'androidx.health.connect:connect-client:1.1.0'
    implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-android:1.8.1'
}

apply from: 'capacitor.build.gradle'

def servicesJSON = file('google-services.json')
def expectedPkg = "com.entrenamatch.app"
if (servicesJSON.exists() && servicesJSON.length() > 0) {
    def jsonText = servicesJSON.text
    def hasMatch = jsonText.contains('"package_name": "' + expectedPkg + '"') || jsonText.contains('"package_name":"' + expectedPkg + '"')
    if (hasMatch) {
        logger.lifecycle("google-services.json found and CONTAINS MATCHING package ${expectedPkg} — applying com.google.gms.google-services plugin for FCM / Push / Integrity")
        apply plugin: 'com.google.gms.google-services'
    } else {
        logger.error("google-services.json found BUT NO MATCHING CLIENT for package '${expectedPkg}' (the placed json from your path only has com.muscle.* entries). Firebase native init (FCM push, Play Integrity) WILL FAIL — APP MAY CRASH ON LAUNCH or push/verify broken. ACTION: In Firebase Console (project entrenamatch) add/edit Android app with EXACT package com.entrenamatch.app, download fresh google-services.json, overwrite android/app/google-services.json, then rebuild. FAILING BUILD NOW to prevent broken AAB.")
        throw new GradleException("No matching client for ${expectedPkg} in google-services.json from the path you indicated. Fix json (add the app in Firebase Console) and retry build.")
    }
} else {
    logger.warn("google-services.json NOT FOUND or empty in android/app/. Push notifications (FCM) and some Google services will NOT work in the native APK/AAB. Place the file from Firebase Console (package com.entrenamatch.app) and rebuild.")
}

// Apply Crashlytics plugin (after google-services so it can use the config)
apply plugin: 'com.google.firebase.crashlytics'

// Google Play Publisher configuration (for automated uploads to closed beta)
// See: https://github.com/Triple-T/gradle-play-publisher
play {
    // Path to the Service Account JSON key (NEVER commit this file)
    // Supports -Pplay.serviceAccountCredentials=/path/to/key.json for flexibility
    if (project.hasProperty('play.serviceAccountCredentials')) {
        serviceAccountCredentials = file(project.property('play.serviceAccountCredentials'))
    } else {
        serviceAccountCredentials = file("../play-service-account.json")
    }

    // Track configurable via -Pplay.track=internal|alpha|beta (alpha = Prueba cerrada en Play API)
    // You can change to "internal" for very early testing.
    track = project.hasProperty('play.track') ? project.property('play.track') : "alpha"

    // Upload as App Bundle (AAB) - required for modern Play Store
    defaultToAppBundles = true

    // Optional: set to "draft" if you want to review in Console before publishing to testers
    // releaseStatus = project.hasProperty('play.releaseStatus') ? project.property('play.releaseStatus') : "completed"
}
