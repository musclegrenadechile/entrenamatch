apply plugin: 'com.android.application'
apply plugin: 'com.github.triplet.play'

// Load signing properties from keystore.properties (never commit the real file)
def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('keystore.properties')
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    namespace = "com.entrenamatch.app"
    compileSdk = rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "com.entrenamatch.app"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 10
        versionName "0.1.7-prealpha"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    signingConfigs {
        release {
            keyAlias keystoreProperties['keyAlias']
            keyPassword keystoreProperties['keyPassword']
            storeFile keystoreProperties['storeFile'] ? file(keystoreProperties['storeFile']) : null
            storePassword keystoreProperties['storePassword']
        }
    }
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            signingConfig signingConfigs.release
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

def servicesJSON = file('google-services.json')
if (servicesJSON.exists() && servicesJSON.length() > 0) {
    logger.lifecycle("google-services.json found — applying com.google.gms.google-services plugin for FCM / Push")
    apply plugin: 'com.google.gms.google-services'
} else {
    logger.warn("google-services.json NOT FOUND or empty in android/app/. Push notifications (FCM) and some Google services will NOT work in the native APK/AAB. Place the file from Firebase Console (package com.entrenamatch.app) and rebuild.")
}

// Google Play Publisher configuration (for automated uploads to closed beta)
// See: https://github.com/Triple-T/gradle-play-publisher
play {
    // Path to the Service Account JSON key (NEVER commit this file)
    // Supports -Pplay.serviceAccountCredentials=/path/to/key.json for flexibility
    if (project.hasProperty('play.serviceAccountCredentials')) {
        serviceAccountCredentials = file(project.property('play.serviceAccountCredentials'))
    } else {
        serviceAccountCredentials = file("../play-service-account.json")
    }

    // Track configurable via -Pplay.track=internal|closed (default closed for beta cerrada)
    // You can change to "internal" for very early testing.
    track = project.hasProperty('play.track') ? project.property('play.track') : "closed"

    // Upload as App Bundle (AAB) - required for modern Play Store
    defaultToAppBundles = true

    // Optional: set to "draft" if you want to review in Console before publishing to testers
    // releaseStatus = project.hasProperty('play.releaseStatus') ? project.property('play.releaseStatus') : "completed"
}
